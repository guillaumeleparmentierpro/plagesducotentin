<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <!-- Balise vitale pour le mobile : empêche le zoom intempestif et adapte la largeur -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Plages du Cotentin</title>
    
    <!-- PWA / Manifest -->
    <link rel="manifest" href="manifest.json">
    <!-- Couleur de la barre d'état sur smartphone -->
    <meta name="theme-color" content="#0284c7">
    <!-- Icône pour les appareils Apple (iOS) -->
    <link rel="apple-touch-icon" href="css/icon-192.png">
    
    <!-- CSS (Tailwind via CDN pour prototyper une interface propre instantanément) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Fichier CSS local pour tes propres ajustements si besoin -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-slate-50 text-slate-800 font-sans antialiased">

    <!-- En-tête de l'application -->
    <header class="bg-sky-600 text-white p-4 shadow-md sticky top-0 z-50">
        <h1 class="text-2xl font-bold text-center">🌊 Plages du Cotentin</h1>
        <p class="text-sm text-center text-sky-100">L'indicateur d'activités en temps réel</p>
    </header>

    <!-- Conteneur principal -->
    <main class="p-4 max-w-md mx-auto mt-4 space-y-6" id="app-container">
        
        <!-- Carte : Pêche à pied -->
        <section class="bg-white rounded-xl shadow p-4 border-l-4 border-orange-400">
            <div class="flex justify-between items-center mb-2">
                <h2 class="font-bold text-lg">🦀 Pêche à pied</h2>
                <span class="px-3 py-1 bg-orange-100 text-orange-800 rounded-full text-xs font-bold" id="statut-peche">ORANGE</span>
            </div>
            <p class="text-sm text-gray-600" id="message-peche">En attente des coefficients et heures de marée...</p>
        </section>

        <!-- Carte : Plage & Bronzette -->
        <section class="bg-white rounded-xl shadow p-4 border-l-4 border-gray-300">
            <div class="flex justify-between items-center mb-2">
                <h2 class="font-bold text-lg">🏖️ Bronzette & Sable</h2>
                <span class="px-3 py-1 bg-gray-100 text-gray-600 rounded-full text-xs font-bold" id="statut-plage">À CALCULER</span>
            </div>
            <p class="text-sm text-gray-600" id="message-plage">Croisement météo et vent en cours...</p>
        </section>

    </main>

    <!-- Scripts -->
    <!-- type="module" est indispensable pour utiliser les 'import / export' de tes fichiers JS -->
    <script type="module" src="js/app.js"></script>
    
    <!-- Enregistrement du Service Worker (le moteur de la PWA qui gère le mode hors ligne et l'installation) -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                    .then(reg => console.log('Service Worker enregistré avec succès !', reg.scope))
                    .catch(err => console.error('Erreur Service Worker :', err));
            });
        }
    </script>
</body>
</html>
